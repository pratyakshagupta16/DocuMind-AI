services:
  - type: web
    name: documind-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: OLLAMA_BASE_URL
        sync: false
        description: "URL of your running Ollama API (e.g. http://your-gpu-vps:11434)"
      - key: OLLAMA_MODEL
        value: llama3
